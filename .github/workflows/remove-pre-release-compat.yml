name: Remove pre-release compatibility

on:
  push:
    branches:
      - agent/v0.2-design-production-system
    paths:
      - scripts/remove-pre-release-compat.mjs
      - .github/workflows/remove-pre-release-compat.yml

permissions:
  contents: write

concurrency:
  group: remove-pre-release-compat
  cancel-in-progress: true

jobs:
  clean:
    name: Simplify v0.2 command surface
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          ref: agent/v0.2-design-production-system
          persist-credentials: true
      - uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8 # v4
        with:
          node-version: 22
      - run: node scripts/remove-pre-release-compat.mjs
      - run: npm run validate
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "remove pre-release compatibility surface"
          git push origin HEAD:agent/v0.2-design-production-system
